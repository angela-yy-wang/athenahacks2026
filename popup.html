<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 16px; width: 280px; }
        label { display: block; margin-top: 12px; font-size: 13px; color: #555; }
        input, select { width: 100%; padding: 6px 8px; margin-top: 4px;
            border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        button { margin-top: 16px; width: 100%; padding: 8px;
            background: #4f46e5; color: white; border: none;
            border-radius: 6px; cursor: pointer; font-size: 14px; }
        #status { margin-top: 8px; font-size: 12px; color: green; display: none; }
    </style>
</head>
<body>
<h3 style="margin:0 0 4px">RateReady</h3>
<p style="font-size:12px;color:#888;margin:0 0 12px">
    Get notified when exchange rates favor your tuition payment.
</p>

<label>Home currency
    <select id="currency">
        <option value="INR">INR — Indian Rupee</option>
        <option value="CNY">CNY — Chinese Yuan</option>
        <option value="KRW">KRW — South Korean Won</option>
        <option value="BRL">BRL — Brazilian Real</option>
        <option value="NGN">NGN — Nigerian Naira</option>
        <option value="MXN">MXN — Mexican Peso</option>
    </select>
</label>

<label>Tuition amount (USD)
    <input type="number" id="amount" placeholder="e.g. 8000" />
</label>

<label>Payment deadline
    <input type="date" id="deadline" />
</label>

<label>Look-ahead window (days)
    <input type="number" id="days" value="30" min="7" max="60" />
</label>

<button id="save">Save & get recommendation</button>
<div id="status">Saved! Check the payment portal for your recommendation.</div>

<script src="popup.js"></script>
</body>
</html>
